<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hoverbar Settings</title>
    <style>
      html,
      body {
        width: 460px;
        min-width: 460px;
        max-width: 460px;
        margin: 0;
        overflow-x: hidden;
        overflow-y: auto;
      }
    </style>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="popup">
      <section class="panel" aria-label="Display settings">
        <header class="settings-header">
          <h1>Hoverbar</h1>
          <span class="title-bookmarks" aria-hidden="true">
            <svg class="title-bookmark title-bookmark-red" viewBox="0 0 16 24" focusable="false">
              <path d="M2 2h12v19l-6-4-6 4z"></path>
            </svg>
            <svg class="title-bookmark title-bookmark-yellow" viewBox="0 0 16 24" focusable="false">
              <path d="M2 2h12v19l-6-4-6 4z"></path>
            </svg>
            <svg class="title-bookmark title-bookmark-teal" viewBox="0 0 16 24" focusable="false">
              <path d="M2 2h12v19l-6-4-6 4z"></path>
            </svg>
          </span>
        </header>

        <div class="settings-grid">
          <label class="setting-row">
            <span class="setting-copy">
              <strong>Show Hoverbar on newtab</strong>
            </span>
            <input id="show-newtab-bar" class="switch-input" type="checkbox" role="switch">
            <span class="switch" aria-hidden="true"></span>
          </label>

          <label class="setting-row">
            <span class="setting-copy">
              <strong>Bar position</strong>
            </span>
            <select id="bar-position" class="select-input">
              <option value="top">Top</option>
              <option value="bottom">Bottom</option>
              <option value="left">Left</option>
              <option value="right">Right</option>
            </select>
          </label>

          <label class="setting-row">
            <span class="setting-copy">
              <strong>Open bookmarks</strong>
            </span>
            <select id="bookmark-open-behavior" class="select-input">
              <option value="current-tab">Current tab</option>
              <option value="new-tab">New tab</option>
            </select>
          </label>

          <label class="setting-row">
            <span class="setting-copy">
              <strong>Show bookmark names</strong>
            </span>
            <input id="show-names" class="switch-input" type="checkbox" role="switch">
            <span class="switch" aria-hidden="true"></span>
          </label>

          <label class="setting-row">
            <span class="setting-copy">
              <strong>Show names inside folders</strong>
            </span>
            <input id="show-folder-names" class="switch-input" type="checkbox" role="switch">
            <span class="switch" aria-hidden="true"></span>
          </label>

          <label class="setting-row">
            <span class="setting-copy">
              <strong>Icon size</strong>
            </span>
            <select id="icon-size-preset" class="select-input">
              <option value="small">Small</option>
              <option value="default">Default</option>
              <option value="large">Large</option>
            </select>
          </label>

          <label class="setting-row">
            <span class="setting-copy">
              <strong>Apply icon size inside folders</strong>
            </span>
            <input id="resize-folder-menu-icons" class="switch-input" type="checkbox" role="switch">
            <span class="switch" aria-hidden="true"></span>
          </label>

          <label class="setting-row">
            <span class="setting-copy">
              <strong>Spacing</strong>
            </span>
            <select id="spacing-preset" class="select-input">
              <option value="compact">Compact</option>
              <option value="default">Default</option>
              <option value="comfortable">Comfortable</option>
            </select>
          </label>

          <label class="setting-row">
            <span class="setting-copy">
              <strong>Folder icon style</strong>
            </span>
            <select id="folder-icon-mode" class="select-input">
              <option value="emoji">Emoji when available</option>
              <option value="folder">Folder only</option>
              <option value="both">Folder and emoji</option>
            </select>
          </label>

          <div class="setting-row">
            <span class="setting-copy">
              <strong>Folder icon color</strong>
            </span>
            <span class="color-control">
              <span id="folder-color-swatch" class="color-swatch" aria-hidden="true"></span>
              <input id="folder-color-text" class="color-text-input" type="text" placeholder="#D0A21B" aria-label="Folder color hex value" spellcheck="false">
            </span>
          </div>
        </div>
      </section>
    </main>

    <script src="options.js"></script>
  </body>
</html>
