<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hoverbar</title>
    <link rel="stylesheet" href="newtab.css">
  </head>
  <body>
    <div class="newtab-shell">
      <div class="newtab-scroll">
        <div class="newtab-items" role="toolbar" aria-label="Hoverbar bookmarks"></div>
      </div>
      <div class="newtab-popups"></div>
      <div class="newtab-context-menu" hidden></div>
    </div>
    <script src="newtab.js"></script>
  </body>
</html>
